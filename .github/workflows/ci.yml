name: CI

on:
  push:
    branches: [master]
  pull_request:
  # Daily unconditional full run. The `expensive` job's path filter skips Miri
  # when no Miri inputs changed, but `rust-toolchain` pins a dateless `nightly`,
  # so the channel can advance (and Miri/compiler behaviour drift) without any
  # tracked file changing. A run of Miri-input-untouched PRs would then skip
  # Miri right across a nightly bump and miss the drift. This scheduled run
  # forces the full Miri suite at least once a day regardless of paths, so
  # nightly drift is caught within ~24h even without a Miri-touching PR.
  schedule:
    - cron: '0 6 * * *'

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Fail fast on network flakiness fetching crates rather than hanging.
  CARGO_NET_RETRY: "3"

jobs:
  # Cheap, fast feedback: host unit tests + compile-check every crate on its
  # real target. This is the gate that should almost always be green.
  #
  # Clippy is intentionally NOT run here yet: `cargo kclippy` currently fails on
  # pre-existing code (clippy::not_unsafe_ptr_arg_deref on kernel_entry) and
  # `shared` has lint warnings, so it can't be a hard gate without code changes
  # unrelated to CI setup. Add a clippy job once those are addressed.
  cheap:
    name: Cheap (tests + checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        run: |
          # The `rust-toolchain` file pins bare `nightly`; make sure it is
          # installed with the components the build-std targets need.
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly rust-src
          rustup target add --toolchain nightly x86_64-unknown-uefi
          rustup show

      - uses: Swatinem/rust-cache@v2

      # Host unit tests (the `shared` crate: paging harness, address types, ...).
      - name: Unit tests (shared)
        run: cargo stest

      # Compile-check each crate on the target it actually ships on.
      - name: Check kernel
        run: cargo kcheck
      - name: Check loader
        run: cargo lcheck
      - name: Check init
        run: cargo icheck

  # Expensive correctness checks that are too slow for every-push ergonomics on
  # a laptop but are worth it in CI: Miri over the `shared` unsafe page-table
  # walks. MIRIFLAGS live in .cargo/config.toml.
  #
  # `cargo smiri` only exercises the `shared` crate, whose dependencies are all
  # crates.io packages (no path deps into kernel/loader/init), so a change
  # outside the input set below cannot change the Miri result. Rather than
  # filter the whole job out with a trigger-level `paths:` (which would leave a
  # *required* status check pending forever on a docs-only PR and block merge),
  # the job always runs and reports, but the actual Miri work is gated on a
  # path filter. An unrelated PR (e.g. touching only CLAUDE.md or kernel code)
  # gets a ~5s green no-op instead of the full ~15min Miri run.
  expensive:
    name: Expensive (Miri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Inputs that can change a `cargo smiri` outcome:
      #  - shared/**            the code under test (+ its host unit tests)
      #  - Cargo.lock           a version bump to any of shared's deps
      #  - Cargo.toml           [workspace.dependencies] edits shared resolves through
      #  - .cargo/config.toml   MIRIFLAGS live here
      #  - rust-toolchain       nightly drift is a real failure mode (see AGENTS.md)
      #  - this workflow file    changes the job itself
      # On a push where the diff can't be determined, paths-filter reports every
      # file changed, so the fail-safe direction is to run Miri.
      # Skipped on `schedule` (no base commit to diff against); the scheduled
      # run forces Miri unconditionally via the `decide` step below.
      - name: Detect changes to Miri inputs
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            miri:
              - 'shared/**'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - '.cargo/config.toml'
              - 'rust-toolchain'
              - '.github/workflows/ci.yml'

      # Single source of truth for whether Miri runs: any changed input, or the
      # daily scheduled run (which forces a full run to catch nightly drift the
      # path filter can't see — see the `schedule:` trigger above).
      - name: Decide whether to run Miri
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ steps.filter.outputs.miri }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install nightly toolchain (with Miri)
        if: steps.decide.outputs.run == 'true'
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly miri rust-src
          rustup show

      - uses: Swatinem/rust-cache@v2
        if: steps.decide.outputs.run == 'true'

      - name: Miri (shared)
        if: steps.decide.outputs.run == 'true'
        run: cargo smiri

      - name: Skip Miri (no changes to Miri inputs)
        if: steps.decide.outputs.run != 'true'
        run: echo "No changes under shared/ or other Miri inputs; skipping Miri."

  # Build the full UEFI image and boot it in QEMU. Success is signalled by the
  # kernel writing to the `isa-debug-exit` device at the end of kernel_main,
  # which makes QEMU exit with code 33; a panic exits with 35; a hang is caught
  # by the `timeout` wrapper.
  smoke:
    name: Smoke (build image + boot in QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly rust-src
          rustup target add --toolchain nightly x86_64-unknown-uefi
          rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Create .env
        # make-image.sh / run-qemu.sh source .env and hard-fail without it.
        # It's gitignored, so it won't exist on a fresh checkout.
        run: cp .env.example .env

      - name: Ensure OVMF firmware
        # Firmware is vendored under third_party/ovmf so the build is hermetic
        # and needs no network. If the blobs aren't committed, fetch them here
        # (CI has network); once they are, this is a no-op.
        run: |
          if [ ! -f third_party/ovmf/x64/code.fd ] || [ ! -f third_party/ovmf/x64/vars.fd ]; then
            cargo run -p fetch-prebuilts
          fi

      - name: Build image
        run: ./make-image.sh

      - name: Boot smoke test
        run: |
          set +e
          # -no-reboot so a triple fault exits QEMU (non-33) instead of looping.
          # isa-debug-exit is how the kernel reports pass/fail; timeout is the
          # backstop for a true hang that never reaches either exit.
          timeout 120 ./run-qemu.sh \
            -debugcon stdio -display none -no-reboot \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
            > qemu-output.log 2>&1
          code=$?
          echo "----- QEMU debugcon output -----"
          cat qemu-output.log
          echo "--------------------------------"
          echo "QEMU exit code: $code"
          # isa-debug-exit Success (0x10) => (0x10 << 1) | 1 == 33.
          if [ "$code" -eq 33 ]; then
            echo "PASS: kernel reached end of kernel_main."
            exit 0
          elif [ "$code" -eq 35 ]; then
            echo "FAIL: kernel panicked (isa-debug-exit Failed)."
            exit 1
          elif [ "$code" -eq 124 ]; then
            echo "FAIL: boot timed out (hang or never reached kernel_main)."
            exit 1
          else
            echo "FAIL: unexpected QEMU exit code $code (triple fault / QEMU error?)."
            exit 1
          fi

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-output
          path: qemu-output.log
          if-no-files-found: ignore
